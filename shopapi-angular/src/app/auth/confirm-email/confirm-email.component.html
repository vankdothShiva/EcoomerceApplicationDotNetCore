 <div class="row justify-content-center mt-5">
    <div class="col-md-5 text-center">
      <div class="card shadow border-0 rounded-4 p-5">

        @if (isLoading) {
          <!-- Loading state -->
          <div class="spinner-border text-dark mb-3"></div>
          <h4>Confirming your email...</h4>
        }

        @if (!isLoading && isSuccess) {
          <!-- Success state -->
          <div class="text-success mb-3" style="font-size:4rem">
            ✅
          </div>
          <h4 class="text-success">Email Confirmed!</h4>
          <p class="text-muted">
            Your account is now active.
            You can login now!
          </p>
          <a routerLink="/auth/login"
             class="btn btn-dark w-100">
            Go to Login
          </a>
        }

        @if (!isLoading && !isSuccess) {
          <!-- Error state -->
          <div class="text-danger mb-3" style="font-size:4rem">
            ❌
          </div>
          <h4 class="text-danger">Confirmation Failed</h4>
          <p class="text-muted">{{ errorMessage }}</p>
          <a routerLink="/auth/login"
             class="btn btn-outline-dark w-100">
            Back to Login
          </a>
        }

      </div>
    </div>
  </div>
